<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartman Cabinetry — Assembly Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0e0c;
    --bg2: #1a1916;
    --bg3: #222120;
    --bg4: #2a2927;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --muted: #7a7670;
    --muted2: #5a5652;
    --accent: #cc2200;
    --accent2: #ff3a1a;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --yellow: #f59e0b;
    --yellow-dim: rgba(245,158,11,0.15);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --red-dim: rgba(204,34,0,0.15);
    --fh: 'Barlow Condensed', sans-serif;
    --fb: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--fb);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 72px;
    border-bottom: 2px solid var(--accent);
    background: #0a0908;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo img { height: 52px; display: block; }

  .header-center {
    font-family: var(--fh);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  #clock {
    font-family: var(--fh);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .04em;
    min-width: 90px;
    text-align: right;
  }

  /* ── MAIN GRID ── */
  .main {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-family: var(--fh);
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── JOB CARDS ── */
  .jobs-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .job-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    transition: border-color .2s;
  }

  .job-card:hover { border-color: var(--border2); }

  .job-card.complete { border-left: 3px solid var(--green); }
  .job-card.in-progress { border-left: 3px solid var(--yellow); }
  .job-card.not-started { border-left: 3px solid var(--muted2); }
  .job-card.shipping-soon { border-left: 3px solid var(--accent); }

  .job-header {
    padding: 18px 22px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .job-name {
    font-family: var(--fh);
    font-size: 26px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: .01em;
  }

  .job-run {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .job-badge {
    font-family: var(--fh);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-complete { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .badge-progress { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
  .badge-notstarted { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
  .badge-shipping { background: var(--red-dim); color: var(--accent2); border: 1px solid rgba(204,34,0,.3); }

  /* Progress bar */
  .progress-section {
    padding: 0 22px 18px;
  }

  .progress-track {
    height: 6px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease;
  }

  .fill-complete { background: var(--green); }
  .fill-progress { background: var(--yellow); }
  .fill-notstarted { background: var(--muted2); }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-nums {
    font-family: var(--fh);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .progress-nums span { color: var(--muted); font-weight: 400; font-size: 13px; }

  .progress-pct {
    font-family: var(--fh);
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
  }

  /* Ship date row */
  .ship-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 22px 14px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }

  .ship-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ship-date {
    font-family: var(--fh);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .ship-countdown {
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }

  .ship-date.urgent { color: var(--accent2); }
  .ship-date.today { color: var(--green); }

  /* ── NEXT UP BANNER ── */
  .next-up {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-top: 3px solid var(--accent);
    border-radius: 10px;
    padding: 22px 30px;
    display: flex;
    align-items: center;
    gap: 36px;
  }

  .next-badge-label {
    font-family: var(--fh);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--red-dim);
    border: 1px solid rgba(204,34,0,.25);
    padding: 5px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .next-info { flex: 1; }

  .next-name {
    font-family: var(--fh);
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: .01em;
    color: var(--text);
  }

  .next-meta {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
  }

  .next-meta strong { color: var(--text); }

  .next-countdown {
    text-align: center;
    padding: 16px 28px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-width: 120px;
  }

  .count-num {
    font-family: var(--fh);
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    color: var(--accent);
  }

  .count-num.today-num { color: var(--green); font-size: 40px; }

  .count-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 14px;
    font-size: 11px;
    color: var(--muted2);
    border-top: 1px solid var(--border);
    letter-spacing: .06em;
  }

  #stamp { color: var(--muted); }

  /* ── LOADING / ERROR ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    font-family: var(--fh);
    font-size: 18px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--bg4);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-right: 14px;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }

  /* Wide card for single-item rows */
  .jobs-grid.single { grid-template-columns: 1fr; }
  .jobs-grid.triple { grid-template-columns: repeat(3, 1fr); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="https://izhart381.github.io/hartman-job-board/hartman-logo.png" alt="Hartman Cabinetry" onerror="this.style.display='none'">
  </div>
  <div class="header-center">Assembly Board</div>
  <div class="header-right">
    <div class="live-dot"><span class="dot"></span>Live</div>
    <div id="clock">--:-- --</div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><span class="loading-spinner"></span>Loading assembly data…</div>
</div>

<div class="footer">
  Hartman Cabinetry &nbsp;·&nbsp; Assembly Board &nbsp;·&nbsp;
  <span id="stamp">Refreshes every 5 minutes</span>
</div>

<script>
// ── CONFIG ──
const SHEET_ID = '1eP47otC-uNpKzgFnKB1SF4bvqUFIiNhZ8n6Dl5Q5h7g';
const REFRESH  = 5 * 60 * 1000;

// ── CLOCK ──
function tick() {
  const n = new Date(), h = n.getHours() % 12 || 12,
        m = String(n.getMinutes()).padStart(2,'0'),
        ampm = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
}
setInterval(tick, 1000); tick();

// ── DATE HELPERS ──
function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function parseShipDate(s) {
  if (!s || !s.trim()) return null;
  // Handles M/D/YY, M/D/YYYY, MM/DD/YY, MM/DD/YYYY
  const parts = s.trim().split('/');
  if (parts.length !== 3) return null;
  let [m, d, y] = parts.map(Number);
  if (y < 100) y += 2000;
  const dt = new Date(y, m - 1, d);
  return isNaN(dt) ? null : dt;
}

function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysBetween(a, b) {
  return Math.round((b - a) / 86400000);
}

// ── FETCH SUMMARY SHEET ──
async function fetchSummary() {
  // Use the opensheet proxy to get the SUMMARY tab as JSON
  const url = `https://opensheet.elk.sh/${SHEET_ID}/SUMMARY`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const rows = await r.json();
  return rows;
}

// ── PARSE SUMMARY ROWS ──
// Sheet row 1 is the header: Job, Total Cabs, Built, Remaining, % Complete, Ship Date
function parseSummary(rows) {
  const jobs = [];
  for (const row of rows) {
    // opensheet returns objects keyed by header row
    // The SUMMARY sheet has headers: Job, Total Cabs, Built, Remaining, % Complete, Ship Date
    const name = (row['Job'] || row['job'] || '').trim();
    if (!name) continue;

    const total     = parseInt(row['Total Cabs'] || row['total cabs'] || '0') || 0;
    const built     = parseInt(row['Built'] || row['built'] || '0') || 0;
    const remaining = parseInt(row['Remaining'] || row['remaining'] || '0') || 0;
    const pctRaw    = (row['% Complete'] || row['% complete'] || '').replace('%','').trim();
    const pct       = parseInt(pctRaw) || (total > 0 ? Math.round(built / total * 100) : 0);
    const shipRaw   = (row['Ship Date'] || row['ship date'] || '').trim();
    const shipDate  = parseShipDate(shipRaw);

    jobs.push({ name, total, built, remaining, pct, shipDate, shipRaw });
  }
  return jobs;
}

// ── DETERMINE CARD STATUS ──
function jobStatus(job) {
  if (job.pct >= 100) return 'complete';
  const t = today0();
  if (job.shipDate) {
    const days = daysBetween(t, job.shipDate);
    if (days <= 3 && days >= 0 && job.pct < 100) return 'shipping-soon';
  }
  if (job.built > 0) return 'in-progress';
  return 'not-started';
}

function statusBadge(status) {
  const map = {
    'complete':      ['badge-complete',    'Complete'],
    'in-progress':   ['badge-progress',    'In Progress'],
    'not-started':   ['badge-notstarted',  'Not Started'],
    'shipping-soon': ['badge-shipping',    'Ships Soon'],
  };
  return map[status] || map['not-started'];
}

function fillClass(status) {
  if (status === 'complete') return 'fill-complete';
  if (status === 'in-progress' || status === 'shipping-soon') return 'fill-progress';
  return 'fill-notstarted';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PARSE JOB NAME / RUN ──
function splitJobName(name) {
  // "Weaver - Run 2" → { client: "Weaver", run: "Run 2" }
  const m = name.match(/^(.*?)\s*[-–]\s*(Run\s*\d+.*)$/i);
  if (m) return { client: m[1].trim(), run: m[2].trim() };
  return { client: name, run: '' };
}

// ── RENDER ──
function render(jobs) {
  const t = today0();

  // Stats
  const totalJobs    = jobs.length;
  const totalCabs    = jobs.reduce((s,j) => s + j.total, 0);
  const totalBuilt   = jobs.reduce((s,j) => s + j.built, 0);
  const overallPct   = totalCabs > 0 ? Math.round(totalBuilt / totalCabs * 100) : 0;

  // Next shipping job (soonest future ship date, not complete)
  const withDates = jobs
    .filter(j => j.shipDate && j.pct < 100)
    .sort((a,b) => a.shipDate - b.shipDate);
  const nextJob = withDates[0] || null;

  let h = '';

  // ── NEXT UP BANNER ──
  if (nextJob) {
    const days = daysBetween(t, nextJob.shipDate);
    const { client, run } = splitJobName(nextJob.name);
    h += `<div class="next-up">
      <div class="next-badge-label">▲ Next Ship</div>
      <div class="next-info">
        <div class="next-name">${esc(client)}</div>
        <div class="next-meta">${run ? `<strong>${esc(run)}</strong> &nbsp;·&nbsp; ` : ''}${nextJob.built} of ${nextJob.total} cabinets built &nbsp;·&nbsp; <strong>${nextJob.pct}%</strong> complete</div>
      </div>
      <div class="next-countdown">
        ${days === 0
          ? `<div class="count-num today-num">TODAY</div>`
          : days < 0
            ? `<div class="count-num" style="color:var(--accent2)">${Math.abs(days)}</div>`
            : `<div class="count-num">${days}</div>`
        }
        <div class="count-label">${days === 0 ? 'ships today' : days < 0 ? 'days overdue' : 'days away'}</div>
      </div>
    </div>`;
  }

  // ── SUMMARY STATS STRIP ──
  h += `<div class="summary-strip">
    <div class="stat-card">
      <div class="stat-label">Active Jobs</div>
      <div class="stat-value">${totalJobs}</div>
      <div class="stat-sub">on the board</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Cabinets</div>
      <div class="stat-value">${totalCabs}</div>
      <div class="stat-sub">${totalBuilt} built · ${totalCabs - totalBuilt} remaining</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Overall Progress</div>
      <div class="stat-value">${overallPct}<span style="font-size:22px;color:var(--muted)">%</span></div>
      <div class="stat-sub">across all jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Complete</div>
      <div class="stat-value" style="color:var(--green)">${jobs.filter(j=>j.pct>=100).length}</div>
      <div class="stat-sub">of ${totalJobs} jobs</div>
    </div>
  </div>`;

  // ── JOB CARDS ──
  const cols = jobs.length === 1 ? 'single' : jobs.length === 3 ? 'triple' : '';
  h += `<div class="jobs-grid ${cols}">`;

  for (const job of jobs) {
    const status = jobStatus(job);
    const [badgeClass, badgeText] = statusBadge(status);
    const { client, run } = splitJobName(job.name);
    const shipDate = job.shipDate;
    const days = shipDate ? daysBetween(t, shipDate) : null;

    let shipDateClass = '';
    if (days !== null) {
      if (days === 0) shipDateClass = 'today';
      else if (days < 0 || days <= 3) shipDateClass = 'urgent';
    }

    h += `<div class="job-card ${status}">
      <div class="job-header">
        <div>
          <div class="job-name">${esc(client)}</div>
          ${run ? `<div class="job-run">${esc(run)}</div>` : ''}
        </div>
        <div class="job-badge ${badgeClass}">${badgeText}</div>
      </div>

      <div class="progress-section">
        <div class="progress-track">
          <div class="progress-fill ${fillClass(status)}" style="width:${job.pct}%"></div>
        </div>
        <div class="progress-labels">
          <div class="progress-nums">${job.built} <span>/ ${job.total} cabinets</span></div>
          <div class="progress-pct">${job.pct}%</div>
        </div>
      </div>

      ${shipDate ? `
      <div class="ship-row">
        <div class="ship-label">Ship Date</div>
        <div>
          <span class="ship-date ${shipDateClass}">${fmtDate(shipDate)}</span>
          ${days !== null
            ? `<span class="ship-countdown">${
                days === 0 ? '— Today!' :
                days < 0  ? `(${Math.abs(days)}d overdue)` :
                            `(${days}d away)`
              }</span>`
            : ''}
        </div>
      </div>` : ''}
    </div>`;
  }

  h += '</div>';
  document.getElementById('main').innerHTML = h;
}

// ── LOAD ──
async function load() {
  try {
    const rows = await fetchSummary();
    const jobs = parseSummary(rows);
    if (jobs.length === 0) {
      document.getElementById('main').innerHTML =
        '<div class="error-msg">No jobs found in the SUMMARY sheet.<br><small>Make sure the sheet is published and has the correct headers.</small></div>';
      return;
    }
    render(jobs);
    document.getElementById('stamp').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="error-msg">Could not load sheet data.<br><small>${e.message}</small><br><br>
       Make sure the sheet is shared as <strong>Anyone with the link can view</strong>
       and published to web.</div>`;
    document.getElementById('stamp').textContent = 'Failed to fetch · ' + new Date().toLocaleTimeString();
  }
}

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
