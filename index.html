<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartman Cabinetry — Job Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg:      #f4f2ee;
    --bg2:     #ffffff;
    --bg3:     #eceae5;
    --border:  rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text:    #1a1714;
    --muted:   #6b6460;
    --muted2:  #9b9490;
    --accent:  #cc2200;
    --accent2: #e03010;
    --green:   #16a34a;
    --gdim:    rgba(22,163,74,0.10);
    --yellow:  #d97706;
    --ydim:    rgba(217,119,6,0.10);
    --blue:    #2563eb;
    --bdim:    rgba(37,99,235,0.10);
    --purple:  #7c3aed;
    --pdim:    rgba(124,58,237,0.10);
    --rdim:    rgba(204,34,0,0.08);
    --fh:      'Barlow Condensed', sans-serif;
    --fb:      'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--fb);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 68px;
    background: #fff;
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    position: sticky; top: 0; z-index: 100;
    flex-shrink: 0;
  }
  .logo img { height: 48px; display: block; }
  .header-title {
    font-family: var(--fh); font-size: 13px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px; background: var(--green); border-radius: 50%;
    animation: pulse 2s infinite; box-shadow: 0 0 5px rgba(22,163,74,.5);
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #clock {
    font-family: var(--fh); font-size: 22px; font-weight: 700;
    color: var(--text); letter-spacing: .04em; min-width: 88px; text-align: right;
  }

  /* ── BODY LAYOUT ── */
  .body {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* ── LEFT PANEL — SHOP TRACKER ── */
  .panel-left {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    border-right: 2px solid var(--border2);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 22px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-header-title {
    font-family: var(--fh); font-size: 11px; font-weight: 800;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }
  .panel-count {
    font-family: var(--fh); font-size: 11px; font-weight: 600;
    color: var(--muted2); letter-spacing: .06em;
  }

  .jobs-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Job card */
  .job-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 4px solid transparent;
    border-radius: 8px;
    padding: 14px 16px;
    transition: box-shadow .15s;
  }
  .job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .job-card.s-scheduled { border-left-color: var(--blue); }
  .job-card.s-build     { border-left-color: var(--yellow); }
  .job-card.s-complete  { border-left-color: var(--green); }
  .job-card.s-tentative { border-left-color: var(--purple); }
  .job-card.s-hold      { border-left-color: var(--muted2); }

  .job-row1 {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
    margin-bottom: 8px;
  }
  .job-name {
    font-family: var(--fh); font-size: 20px; font-weight: 800;
    color: var(--text); line-height: 1; letter-spacing: .01em;
  }

  .status-badge {
    font-family: var(--fh); font-size: 10px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
  }
  .sb-scheduled { background: var(--bdim);  color: var(--blue);   border: 1px solid rgba(37,99,235,.25); }
  .sb-build     { background: var(--ydim);  color: var(--yellow); border: 1px solid rgba(217,119,6,.25); }
  .sb-complete  { background: var(--gdim);  color: var(--green);  border: 1px solid rgba(22,163,74,.25); }
  .sb-tentative { background: var(--pdim);  color: var(--purple); border: 1px solid rgba(124,58,237,.25); }
  .sb-hold      { background: rgba(0,0,0,.04); color: var(--muted); border: 1px solid var(--border2); }

  .job-row2 {
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .job-meta {
    display: flex; flex-direction: column; gap: 1px;
  }
  .meta-label {
    font-size: 9px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted2);
  }
  .meta-value {
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .meta-value.empty { color: var(--muted2); font-style: italic; font-weight: 400; }
  .notes-text {
    font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 6px;
    padding-top: 6px; border-top: 1px solid var(--border);
    font-style: italic;
  }

  /* Date countdown */
  .date-soon   { color: var(--accent); font-weight: 700; }
  .date-today  { color: var(--green); font-weight: 700; }
  .date-past   { color: var(--muted); text-decoration: line-through; }

  /* ── RIGHT PANEL — ASSEMBLY SUMMARY ── */
  .panel-right {
    width: 340px;
    flex-shrink: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .asm-header {
    padding: 14px 20px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .asm-header-title {
    font-family: var(--fh); font-size: 11px; font-weight: 800;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
  }

  .asm-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  /* Next ship block */
  .next-ship-block {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-top: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px;
  }
  .ns-eyebrow {
    font-family: var(--fh); font-size: 10px; font-weight: 800;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .ns-name {
    font-family: var(--fh); font-size: 28px; font-weight: 900;
    line-height: 1; color: var(--text); letter-spacing: .01em;
  }
  .ns-run {
    font-size: 12px; color: var(--muted); margin-top: 2px;
  }
  .ns-countdown {
    display: flex; align-items: baseline; gap: 6px; margin-top: 12px;
  }
  .ns-count-num {
    font-family: var(--fh); font-size: 52px; font-weight: 900;
    line-height: 1; color: var(--accent);
  }
  .ns-count-num.today { color: var(--green); font-size: 32px; line-height: 1.2; }
  .ns-count-num.overdue { color: var(--accent); }
  .ns-count-label {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .ns-progress-wrap { margin-top: 12px; }
  .ns-progress-labels {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-bottom: 4px;
  }
  .ns-progress-labels strong { color: var(--text); }
  .ns-bar {
    height: 8px; background: var(--bg3);
    border-radius: 4px; overflow: hidden;
  }
  .ns-bar-fill {
    height: 100%; border-radius: 4px;
    background: var(--accent); transition: width .6s ease;
  }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 14px;
  }
  .stat-label {
    font-size: 9px; font-weight: 800; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted2); margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--fh); font-size: 34px; font-weight: 900;
    line-height: 1; color: var(--text);
  }
  .stat-value.green { color: var(--green); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Assembly job list (mini) */
  .asm-job-list { display: flex; flex-direction: column; gap: 8px; }
  .asm-job-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 7px; padding: 10px 12px;
  }
  .asm-job-row.complete     { border-left-color: var(--green); }
  .asm-job-row.in-progress  { border-left-color: var(--yellow); }
  .asm-job-row.not-started  { border-left-color: var(--muted2); }
  .asm-job-row.ships-soon   { border-left-color: var(--accent); }

  .asm-job-name {
    font-family: var(--fh); font-size: 16px; font-weight: 800;
    color: var(--text); line-height: 1;
  }
  .asm-job-run { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .asm-mini-bar {
    height: 4px; background: var(--bg3);
    border-radius: 2px; overflow: hidden; margin: 6px 0 4px;
  }
  .asm-mini-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
  .fill-green  { background: var(--green); }
  .fill-yellow { background: var(--yellow); }
  .fill-grey   { background: var(--muted2); }
  .fill-red    { background: var(--accent); }

  .asm-job-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--muted);
  }
  .asm-job-pct { font-family: var(--fh); font-size: 16px; font-weight: 800; color: var(--text); }
  .asm-ship-date { font-size: 11px; }
  .asm-ship-date.urgent { color: var(--accent); font-weight: 700; }
  .asm-ship-date.today-date { color: var(--green); font-weight: 700; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 10px;
    font-size: 11px; color: var(--muted2);
    border-top: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  #stamp { color: var(--muted); }

  /* Loading / error */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 60px 20px; font-family: var(--fh); font-size: 16px;
    letter-spacing: .1em; color: var(--muted); text-transform: uppercase;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--bg3);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { padding: 30px 16px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.8; }
  .error-msg code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-size: 11px; color: var(--accent); }

  .divider-label {
    font-family: var(--fh); font-size: 10px; font-weight: 800;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--muted2); padding: 4px 0 2px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="https://izhart381.github.io/hartman-job-board/hartman-logo.png"
         alt="Hartman Cabinetry" onerror="this.style.display='none'">
  </div>
  <div class="header-title">Job &amp; Assembly Board</div>
  <div class="header-right">
    <div class="live-dot"><span class="dot"></span>Live</div>
    <div id="clock">--:-- --</div>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- LEFT: SHOP TRACKER -->
  <div class="panel-left">
    <div class="panel-header">
      <div class="panel-header-title">Shop Tracker</div>
      <div class="panel-count" id="job-count">—</div>
    </div>
    <div class="jobs-list" id="jobs-list">
      <div class="loading"><span class="spinner"></span>Loading jobs…</div>
    </div>
  </div>

  <!-- RIGHT: ASSEMBLY SUMMARY -->
  <div class="panel-right">
    <div class="asm-header">
      <div class="asm-header-title">Assembly Summary</div>
    </div>
    <div class="asm-body" id="asm-body">
      <div class="loading"><span class="spinner"></span>Loading…</div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  Hartman Cabinetry &nbsp;·&nbsp; <span id="stamp">Refreshes every 5 minutes</span>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const TRACKER_ID   = '1R2LpMzNtjFM8K5-8w911WOxiB8zWyeST9v5BXFtN-2U';
const ASSEMBLY_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7ILqbViVY6JtDQ6Kz9cYhpjhWat3vPZIofW47wn957KoRwZP-mhHnAuPPFJIDRLF2tLSntrhPpRFg/pub?gid=1899877580&single=true&output=csv';
const REFRESH      = 5 * 60 * 1000;

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tick() {
  const n = new Date(), h = n.getHours() % 12 || 12,
        m = String(n.getMinutes()).padStart(2,'0'),
        ap = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clock').textContent = h + ':' + m + ' ' + ap;
}
setInterval(tick, 1000); tick();

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function parseDate(s) {
  if (!s || !s.trim()) return null;
  const p = s.trim().replace(/-/g,'/').split('/');
  if (p.length !== 3) return null;
  let [mo, d, y] = p.map(Number);
  if (y < 100) y += 2000;
  const dt = new Date(y, mo-1, d);
  return isNaN(dt.getTime()) ? null : dt;
}

function fmtDate(d) {
  if (!d) return null;
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FETCH TRACKER (opensheet) ─────────────────────────────────────────────────
async function fetchTracker() {
  const r = await fetch('https://opensheet.elk.sh/' + TRACKER_ID + '/Sheet1', {cache:'no-store'});
  if (!r.ok) throw new Error('Tracker HTTP ' + r.status);
  return r.json();
}

// ── FETCH ASSEMBLY CSV (with CORS fallback) ───────────────────────────────────
function splitLine(line) {
  const vals=[]; let cur='', inQ=false;
  for (const c of line) {
    if (c==='"') inQ=!inQ;
    else if (c===',' && !inQ) { vals.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  vals.push(cur.trim());
  return vals.map(v=>v.replace(/^"|"$/g,'').trim());
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l=>l.replace(/\r/g,''));
  let hi = -1;
  for (let i=0; i<Math.min(5,lines.length); i++) {
    if (/^"?job"?/i.test(lines[i])) { hi=i; break; }
  }
  if (hi===-1) return [];
  const hdrs = splitLine(lines[hi]).map(h=>h.toLowerCase());
  return lines.slice(hi+1).filter(l=>l.trim()).map(l => {
    const vals=splitLine(l); const row={};
    hdrs.forEach((h,i) => row[h]=vals[i]||'');
    return row;
  });
}

async function fetchAssembly() {
  const proxies = [
    ASSEMBLY_CSV,
    'https://corsproxy.io/?' + encodeURIComponent(ASSEMBLY_CSV),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(ASSEMBLY_CSV),
  ];
  for (const url of proxies) {
    try {
      const r = await fetch(url, {cache:'no-store'});
      if (!r.ok) continue;
      const text = await r.text();
      if (!text || text.trim().startsWith('<!')) continue;
      return text;
    } catch(e) { /* try next */ }
  }
  throw new Error('All CSV fetch attempts failed');
}

function parseAssembly(text) {
  return parseCSV(text)
    .filter(r => r['job'] && r['job'].trim())
    .map(r => {
      const total = parseInt(r['total cabs']) || 0;
      const built = parseInt(r['built']) || 0;
      const pctRaw = (r['% complete']||'').replace('%','').trim();
      const pct = parseInt(pctRaw) || (total>0 ? Math.round(built/total*100) : 0);
      return {
        name:     r['job'].trim(),
        total, built,
        remaining: parseInt(r['remaining']) || Math.max(total-built,0),
        pct,
        shipDate: parseDate(r['ship date']),
      };
    });
}

// ── STATUS HELPERS ────────────────────────────────────────────────────────────
function fuzzyStatus(s) {
  const v = (s||'').toLowerCase().replace(/[^a-z]/g,'');
  if (/comp|done/.test(v))            return 'complete';
  if (/build|progress|prod/.test(v))  return 'build';
  if (/tent/.test(v))                 return 'tentative';
  if (/hold/.test(v))                 return 'hold';
  return 'scheduled';
}

function statusBadge(status) {
  const map = {
    scheduled: ['sb-scheduled','Scheduled'],
    build:     ['sb-build',    'In Build'],
    complete:  ['sb-complete', 'Complete'],
    tentative: ['sb-tentative','Tentative'],
    hold:      ['sb-hold',     'On Hold'],
  };
  return map[status] || ['sb-scheduled','Scheduled'];
}

function asmStatus(job) {
  if (job.pct >= 100) return 'complete';
  if (job.shipDate) {
    const d = daysBetween(today0(), job.shipDate);
    if (d <= 3 && d >= 0) return 'ships-soon';
  }
  return job.built > 0 ? 'in-progress' : 'not-started';
}

function asmFillClass(status) {
  if (status==='complete')   return 'fill-green';
  if (status==='in-progress') return 'fill-yellow';
  if (status==='ships-soon') return 'fill-red';
  return 'fill-grey';
}

function splitJobName(name) {
  const m = name.match(/^(.*?)\s*[-–]\s*(Run\s*\d+.*)$/i);
  return m ? {client:m[1].trim(), run:m[2].trim()} : {client:name, run:''};
}

// ── RENDER LEFT: SHOP TRACKER ─────────────────────────────────────────────────
function renderTracker(jobs) {
  const t = today0();
  const visible = jobs.filter(j => {
    const s = fuzzyStatus(j['Status']);
    return s !== 'complete'; // hide complete jobs — uncomment to show all:
    // return true;
  });

  document.getElementById('job-count').textContent =
    visible.length + ' job' + (visible.length!==1?'s':'') + ' active';

  if (visible.length === 0) {
    document.getElementById('jobs-list').innerHTML =
      '<div class="loading" style="color:var(--muted)">No active jobs</div>';
    return;
  }

  let h = '';
  for (const job of visible) {
    const name       = (job['Job Name']   || '').trim();
    const contractor = (job['Contractor'] || '').trim();
    const notes      = (job['Notes']      || '').trim();
    const status     = fuzzyStatus(job['Status']);
    const installDate= parseDate(job['Install Date']);
    const [badgeCls, badgeTxt] = statusBadge(status);

    const days = installDate ? daysBetween(t, installDate) : null;
    let dateCls = '', dateLabel = fmtDate(installDate) || '';
    if (days !== null) {
      if (days === 0)       { dateCls = 'date-today';  dateLabel += ' — Today!'; }
      else if (days < 0)    { dateCls = 'date-past';   dateLabel += ` (${Math.abs(days)}d ago)`; }
      else if (days <= 7)   { dateCls = 'date-soon';   dateLabel += ` (${days}d)`; }
    }

    h += `<div class="job-card s-${status}">
      <div class="job-row1">
        <div class="job-name">${esc(name)||'—'}</div>
        <div class="status-badge ${badgeCls}">${badgeTxt}</div>
      </div>
      <div class="job-row2">
        ${contractor ? `<div class="job-meta">
          <div class="meta-label">Contractor</div>
          <div class="meta-value">${esc(contractor)}</div>
        </div>` : ''}
        ${installDate ? `<div class="job-meta">
          <div class="meta-label">Install Date</div>
          <div class="meta-value ${dateCls}">${dateLabel}</div>
        </div>` : ''}
      </div>
      ${notes ? `<div class="notes-text">${esc(notes)}</div>` : ''}
    </div>`;
  }

  document.getElementById('jobs-list').innerHTML = h;
}

// ── RENDER RIGHT: ASSEMBLY SUMMARY ───────────────────────────────────────────
function renderAssembly(jobs) {
  const t = today0();
  if (!jobs || jobs.length === 0) {
    document.getElementById('asm-body').innerHTML =
      '<div class="error-msg">No data in Assembly Summary sheet.</div>';
    return;
  }

  const totalCabs   = jobs.reduce((s,j) => s+j.total, 0);
  const totalBuilt  = jobs.reduce((s,j) => s+j.built, 0);
  const overallPct  = totalCabs > 0 ? Math.round(totalBuilt/totalCabs*100) : 0;
  const completeCount = jobs.filter(j => j.pct >= 100).length;

  // Next ship = soonest incomplete job with a ship date
  const nextJob = jobs
    .filter(j => j.shipDate && j.pct < 100)
    .sort((a,b) => a.shipDate - b.shipDate)[0] || null;

  let h = '';

  // ── NEXT SHIP BLOCK ──
  if (nextJob) {
    const days = daysBetween(t, nextJob.shipDate);
    const {client, run} = splitJobName(nextJob.name);
    h += `<div class="next-ship-block">
      <div class="ns-eyebrow">▲ Next to Ship</div>
      <div class="ns-name">${esc(client)}</div>
      ${run ? `<div class="ns-run">${esc(run)}</div>` : ''}
      <div class="ns-countdown">
        ${days === 0
          ? `<div class="ns-count-num today">TODAY</div>`
          : days < 0
            ? `<div class="ns-count-num overdue">${Math.abs(days)}</div>
               <div class="ns-count-label">days<br>overdue</div>`
            : `<div class="ns-count-num">${days}</div>
               <div class="ns-count-label">days<br>away</div>`}
      </div>
      <div class="ns-progress-wrap">
        <div class="ns-progress-labels">
          <span>${nextJob.built} of ${nextJob.total} cabs built</span>
          <strong>${nextJob.pct}%</strong>
        </div>
        <div class="ns-bar">
          <div class="ns-bar-fill" style="width:${nextJob.pct}%"></div>
        </div>
      </div>
    </div>`;
  }

  // ── STAT GRID ──
  h += `<div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">Total Cabs</div>
      <div class="stat-value">${totalCabs}</div>
      <div class="stat-sub">${totalBuilt} built</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Progress</div>
      <div class="stat-value">${overallPct}<span style="font-size:18px;color:var(--muted)">%</span></div>
      <div class="stat-sub">overall</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Jobs</div>
      <div class="stat-value">${jobs.length}</div>
      <div class="stat-sub">on assembly</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Complete</div>
      <div class="stat-value green">${completeCount}</div>
      <div class="stat-sub">of ${jobs.length} jobs</div>
    </div>
  </div>`;

  // ── MINI JOB LIST ──
  h += `<div class="divider-label">All Assembly Jobs</div>`;
  h += `<div class="asm-job-list">`;
  for (const job of jobs) {
    const status = asmStatus(job);
    const {client, run} = splitJobName(job.name);
    const days = job.shipDate ? daysBetween(t, job.shipDate) : null;
    let sdCls = '', sdTxt = fmtDate(job.shipDate) || '';
    if (days !== null) {
      if (days === 0)      { sdCls = 'today-date'; sdTxt = 'Today!'; }
      else if (days < 0)   { sdCls = 'urgent'; sdTxt = `${Math.abs(days)}d overdue`; }
      else if (days <= 5)  { sdCls = 'urgent'; sdTxt += ` (${days}d)`; }
    }

    h += `<div class="asm-job-row ${status}">
      <div class="asm-job-name">${esc(client)}</div>
      ${run ? `<div class="asm-job-run">${esc(run)}</div>` : ''}
      <div class="asm-mini-bar">
        <div class="asm-mini-fill ${asmFillClass(status)}" style="width:${job.pct}%"></div>
      </div>
      <div class="asm-job-meta">
        <span>${job.built}/${job.total} cabs</span>
        <span class="asm-job-pct">${job.pct}%</span>
      </div>
      ${sdTxt ? `<div class="asm-ship-date ${sdCls}" style="font-size:11px;margin-top:3px;color:var(--muted)">${sdTxt}</div>` : ''}
    </div>`;
  }
  h += '</div>';

  document.getElementById('asm-body').innerHTML = h;
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load() {
  // Fetch both sources in parallel; each renders independently
  const trackerPromise = fetchTracker()
    .then(jobs => renderTracker(jobs))
    .catch(e => {
      document.getElementById('jobs-list').innerHTML =
        `<div class="error-msg">Could not load tracker.<br><code>${esc(e.message)}</code></div>`;
    });

  const asmPromise = fetchAssembly()
    .then(text => {
      const jobs = parseAssembly(text);
      renderAssembly(jobs);
    })
    .catch(e => {
      document.getElementById('asm-body').innerHTML =
        `<div class="error-msg">Could not load assembly data.<br><code>${esc(e.message)}</code></div>`;
    });

  await Promise.allSettled([trackerPromise, asmPromise]);
  document.getElementById('stamp').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
