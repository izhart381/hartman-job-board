<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartman Cabinetry — Assembly Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg:    #0f0e0c; --bg2: #1a1916; --bg3: #222120; --bg4: #2a2927;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.12);
    --text: #f0ede8; --muted: #7a7670; --muted2: #5a5652;
    --accent: #cc2200; --accent2: #ff3a1a;
    --green: #22c55e; --gdim: rgba(34,197,94,0.15);
    --yellow: #f59e0b; --ydim: rgba(245,158,11,0.15);
    --rdim: rgba(204,34,0,0.15);
    --fh: 'Barlow Condensed', sans-serif; --fb: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--fb); min-height: 100vh; overflow-x: hidden; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 72px; border-bottom: 2px solid var(--accent);
    background: #0a0908; position: sticky; top: 0; z-index: 100;
  }
  .logo img { height: 52px; display: block; }
  .header-center { font-family: var(--fh); font-size: 13px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 24px; }
  .live-dot { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
  .dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 6px var(--green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  #clock { font-family: var(--fh); font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: .04em; min-width: 90px; text-align: right; }

  .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

  .next-up { background: var(--bg2); border: 1px solid var(--border2); border-top: 3px solid var(--accent); border-radius: 10px; padding: 22px 30px; display: flex; align-items: center; gap: 36px; }
  .next-badge-label { font-family: var(--fh); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); background: var(--rdim); border: 1px solid rgba(204,34,0,.25); padding: 5px 12px; border-radius: 4px; white-space: nowrap; }
  .next-info { flex: 1; }
  .next-name { font-family: var(--fh); font-size: 48px; font-weight: 900; line-height: 1; color: var(--text); }
  .next-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
  .next-meta strong { color: var(--text); }
  .next-countdown { text-align: center; padding: 16px 28px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; min-width: 120px; }
  .count-num { font-family: var(--fh); font-size: 64px; font-weight: 900; line-height: 1; color: var(--accent); }
  .count-num.today-num { color: var(--green); font-size: 36px; line-height: 1.1; }
  .count-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .summary-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .stat-value { font-family: var(--fh); font-size: 40px; font-weight: 800; line-height: 1; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .jobs-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
  .jobs-grid.one   { grid-template-columns: 1fr; }
  .jobs-grid.three { grid-template-columns: repeat(3,1fr); }

  .job-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--muted2); border-radius: 10px; overflow: hidden; transition: border-color .2s; }
  .job-card:hover { border-color: var(--border2); }
  .job-card.complete      { border-left-color: var(--green); }
  .job-card.in-progress   { border-left-color: var(--yellow); }
  .job-card.shipping-soon { border-left-color: var(--accent); }

  .job-header { padding: 18px 22px 12px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .job-name { font-family: var(--fh); font-size: 26px; font-weight: 800; line-height: 1.1; color: var(--text); }
  .job-run { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .job-badge { font-family: var(--fh); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .b-complete { background: var(--gdim); color: var(--green);   border: 1px solid rgba(34,197,94,.3); }
  .b-progress { background: var(--ydim); color: var(--yellow);  border: 1px solid rgba(245,158,11,.3); }
  .b-none     { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
  .b-shipping { background: var(--rdim); color: var(--accent2); border: 1px solid rgba(204,34,0,.3); }

  .progress-section { padding: 0 22px 14px; }
  .progress-track { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .pf-green  { background: var(--green); }
  .pf-yellow { background: var(--yellow); }
  .pf-grey   { background: var(--muted2); }
  .progress-labels { display: flex; justify-content: space-between; align-items: center; }
  .progress-nums { font-family: var(--fh); font-size: 16px; font-weight: 700; color: var(--text); }
  .progress-nums span { color: var(--muted); font-weight: 400; font-size: 13px; }
  .progress-pct { font-family: var(--fh); font-size: 24px; font-weight: 800; color: var(--text); }

  .tracker-row { padding: 10px 22px; border-top: 1px solid var(--border); display: flex; gap: 24px; flex-wrap: wrap; }
  .tr-item { display: flex; flex-direction: column; gap: 2px; }
  .tr-label { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted2); }
  .tr-value { font-size: 13px; font-weight: 600; color: var(--text); }
  .tr-value.dim { color: var(--muted); font-style: italic; font-weight: 400; }
  .shop-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .06em; }
  .ss-sch  { background: rgba(59,130,246,.15);  color: #60a5fa;       border: 1px solid rgba(59,130,246,.3); }
  .ss-bld  { background: var(--ydim);           color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
  .ss-rtc  { background: var(--gdim);           color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
  .ss-wait { background: rgba(168,85,247,.15);  color: #c084fc;       border: 1px solid rgba(168,85,247,.3); }
  .ss-ten  { background: rgba(255,255,255,.05); color: var(--muted);  border: 1px solid var(--border); }
  .ss-cmp  { background: var(--gdim);           color: var(--green);  border: 1px solid rgba(34,197,94,.3); }

  .ship-row { padding: 10px 22px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .ship-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .ship-date { font-family: var(--fh); font-size: 18px; font-weight: 700; color: var(--text); }
  .ship-date.urgent { color: var(--accent2); }
  .ship-date.today  { color: var(--green); }
  .ship-countdown   { font-size: 12px; color: var(--muted); margin-left: 8px; }

  .loading { display: flex; align-items: center; justify-content: center; height: 300px; font-family: var(--fh); font-size: 18px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--bg4); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; line-height: 2; }
  .error-msg code { background: var(--bg3); padding: 2px 6px; border-radius: 3px; font-size: 12px; color: var(--accent2); }

  .footer { text-align: center; padding: 14px; font-size: 11px; color: var(--muted2); border-top: 1px solid var(--border); letter-spacing: .06em; }
  #stamp { color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="https://izhart381.github.io/hartman-job-board/hartman-logo.png"
         alt="Hartman Cabinetry" onerror="this.style.display='none'">
  </div>
  <div class="header-center">Assembly Board</div>
  <div class="header-right">
    <div class="live-dot"><span class="dot"></span>Live</div>
    <div id="clock">--:-- --</div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><span class="spinner"></span>Loading assembly data…</div>
</div>

<div class="footer">
  Hartman Cabinetry &nbsp;·&nbsp; Assembly Board &nbsp;·&nbsp;
  <span id="stamp">Refreshes every 5 minutes</span>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const ASSEMBLY_CSV_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7ILqbViVY6JtDQ6Kz9cYhpjhWat3vPZIofW47wn957KoRwZP-mhHnAuPPFJIDRLF2tLSntrhPpRFg/pub?gid=1899877580&single=true&output=csv';
const TRACKER_ID = '1R2LpMzNtjFM8K5-8w911WOxiB8zWyeST9v5BXFtN-2U';
const REFRESH = 5 * 60 * 1000;

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tick() {
  const n = new Date(), h = n.getHours() % 12 || 12,
        m = String(n.getMinutes()).padStart(2,'0'),
        ap = n.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('clock').textContent = h + ':' + m + ' ' + ap;
}
setInterval(tick, 1000); tick();

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s) {
  if (!s || !s.trim()) return null;
  const p = s.trim().replace(/-/g,'/').split('/');
  if (p.length !== 3) return null;
  let [mo, d, y] = p.map(Number);
  if (y < 100) y += 2000;
  const dt = new Date(y, mo-1, d);
  return isNaN(dt.getTime()) ? null : dt;
}
function fmtDate(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function daysBetween(a,b) { return Math.round((b-a)/86400000); }

// ── CSV PARSER ───────────────────────────────────────────────────────────────
function splitLine(line) {
  const vals=[]; let cur='', inQ=false;
  for (const c of line) {
    if (c==='"') inQ=!inQ;
    else if (c===',' && !inQ) { vals.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  vals.push(cur.trim());
  return vals.map(v=>v.replace(/^"|"$/g,'').trim());
}
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l=>l.replace(/\r/g,''));
  let hi = -1;
  for (let i=0; i<Math.min(5,lines.length); i++) {
    if (/^"?job"?/i.test(lines[i])) { hi=i; break; }
  }
  if (hi===-1) return [];
  const hdrs = splitLine(lines[hi]).map(h=>h.toLowerCase());
  return lines.slice(hi+1).filter(l=>l.trim()).map(l => {
    const vals = splitLine(l);
    const row = {};
    hdrs.forEach((h,i) => row[h] = vals[i]||'');
    return row;
  });
}

// ── FETCH WITH CORS PROXY FALLBACK ───────────────────────────────────────────
// Tries direct first, then two CORS proxies. Returns CSV text.
async function fetchCSVWithFallback(url) {
  const attempts = [
    // 1. Direct (works if Google sets correct CORS headers — often does for published sheets)
    () => fetch(url, {cache:'no-store'}),
    // 2. corsproxy.io
    () => fetch('https://corsproxy.io/?' + encodeURIComponent(url), {cache:'no-store'}),
    // 3. allorigins
    () => fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), {cache:'no-store'}),
  ];

  let lastErr = null;
  for (const attempt of attempts) {
    try {
      const r = await attempt();
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      // Sanity check — must look like CSV not an HTML error page
      if (!text || text.trim().startsWith('<!')) throw new Error('Got HTML instead of CSV');
      return text;
    } catch(e) {
      lastErr = e;
    }
  }
  throw new Error('All fetch attempts failed: ' + lastErr.message);
}

// ── FETCH ASSEMBLY ───────────────────────────────────────────────────────────
async function fetchAssembly() {
  const text = await fetchCSVWithFallback(ASSEMBLY_CSV_BASE);
  const rows = parseCSV(text);
  return rows
    .filter(r => r['job'] && r['job'].trim())
    .map(r => {
      const total = parseInt(r['total cabs']) || 0;
      const built = parseInt(r['built']) || 0;
      const pctRaw = (r['% complete']||'').replace('%','').trim();
      const pct = parseInt(pctRaw) || (total>0 ? Math.round(built/total*100) : 0);
      return {
        name:      r['job'].trim(),
        total, built,
        remaining: parseInt(r['remaining']) || Math.max(total-built,0),
        pct,
        shipDate:  parseDate(r['ship date']),
      };
    });
}

// ── FETCH TRACKER ────────────────────────────────────────────────────────────
async function fetchTracker() {
  // opensheet.elk.sh converts a Google Sheet to JSON without auth
  const url = 'https://opensheet.elk.sh/' + TRACKER_ID + '/Sheet1';
  try {
    const r = await fetch(url, {cache:'no-store'});
    if (!r.ok) return [];
    return await r.json();
  } catch(e) { return []; }
}

// ── FUZZY NAME MATCH ─────────────────────────────────────────────────────────
function normName(s) {
  return (s||'').toLowerCase()
    .replace(/\s*[-–—]\s*run\s*\d+.*/i,'')
    .replace(/[^a-z0-9 ]/g,'').trim();
}
function firstWord(s) { return normName(s).split(/\s+/)[0]; }

function matchTracker(asmName, trackerJobs) {
  const aN = normName(asmName);
  const aF = firstWord(asmName);
  let hit = trackerJobs.find(j => normName(j['Job Name'])===aN);
  if (hit) return hit;
  hit = trackerJobs.find(j => {
    const tN = normName(j['Job Name']);
    return tN && (aN.startsWith(tN)||tN.startsWith(aN));
  });
  if (hit) return hit;
  if (aF.length>3) hit = trackerJobs.find(j=>firstWord(j['Job Name'])===aF);
  return hit||null;
}

// ── STATUS & STYLE ───────────────────────────────────────────────────────────
function jobStatus(job) {
  if (job.pct>=100) return 'complete';
  if (job.shipDate) {
    const d = daysBetween(today0(), job.shipDate);
    if (d<=3&&d>=0) return 'shipping-soon';
  }
  return job.built>0 ? 'in-progress' : 'not-started';
}
const BADGE = {
  'complete':      ['b-complete','Complete'],
  'in-progress':   ['b-progress','In Progress'],
  'not-started':   ['b-none',    'Not Started'],
  'shipping-soon': ['b-shipping','Ships Soon'],
};
function fillClass(s) {
  return s==='complete'?'pf-green':(s==='in-progress'||s==='shipping-soon')?'pf-yellow':'pf-grey';
}
function shopBadgeClass(s) {
  const v=(s||'').toLowerCase().replace(/[^a-z]/g,'');
  if(/comp|done/.test(v))           return 'ss-cmp';
  if(/build|progress|prod/.test(v)) return 'ss-bld';
  if(/readytocut|ready/.test(v))    return 'ss-rtc';
  if(/wait|approv/.test(v))         return 'ss-wait';
  if(/tent|hold/.test(v))           return 'ss-ten';
  return 'ss-sch';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function splitJobName(n) {
  const m=n.match(/^(.*?)\s*[-–]\s*(Run\s*\d+.*)$/i);
  return m?{client:m[1].trim(),run:m[2].trim()}:{client:n,run:''};
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(jobs, trackerJobs) {
  const t         = today0();
  const totalCabs = jobs.reduce((s,j)=>s+j.total,0);
  const totalBuilt= jobs.reduce((s,j)=>s+j.built,0);
  const overallPct= totalCabs>0?Math.round(totalBuilt/totalCabs*100):0;

  const nextJob = jobs.filter(j=>j.shipDate&&j.pct<100)
                      .sort((a,b)=>a.shipDate-b.shipDate)[0]||null;

  let h='';

  // NEXT SHIP BANNER
  if (nextJob) {
    const days=daysBetween(t,nextJob.shipDate);
    const {client,run}=splitJobName(nextJob.name);
    const tr=matchTracker(nextJob.name,trackerJobs);
    h+=`<div class="next-up">
      <div class="next-badge-label">▲ Next Ship</div>
      <div class="next-info">
        <div class="next-name">${esc(client)}</div>
        <div class="next-meta">
          ${run?`<strong>${esc(run)}</strong> &nbsp;·&nbsp; `:''}
          ${nextJob.built} of ${nextJob.total} cabinets &nbsp;·&nbsp; <strong>${nextJob.pct}%</strong> complete
          ${tr&&tr['Contractor']?` &nbsp;·&nbsp; ${esc(tr['Contractor'])}`:''}
        </div>
      </div>
      <div class="next-countdown">
        ${days===0?`<div class="count-num today-num">TODAY</div>`
          :days<0?`<div class="count-num" style="color:var(--accent2)">${Math.abs(days)}</div>`
          :`<div class="count-num">${days}</div>`}
        <div class="count-label">${days===0?'ships today':days<0?'days overdue':'days away'}</div>
      </div>
    </div>`;
  }

  // STATS
  h+=`<div class="summary-strip">
    <div class="stat-card"><div class="stat-label">Active Jobs</div><div class="stat-value">${jobs.length}</div><div class="stat-sub">on the board</div></div>
    <div class="stat-card"><div class="stat-label">Total Cabinets</div><div class="stat-value">${totalCabs}</div><div class="stat-sub">${totalBuilt} built · ${totalCabs-totalBuilt} remaining</div></div>
    <div class="stat-card"><div class="stat-label">Overall Progress</div><div class="stat-value">${overallPct}<span style="font-size:22px;color:var(--muted)">%</span></div><div class="stat-sub">across all jobs</div></div>
    <div class="stat-card"><div class="stat-label">Complete</div><div class="stat-value" style="color:var(--green)">${jobs.filter(j=>j.pct>=100).length}</div><div class="stat-sub">of ${jobs.length} jobs</div></div>
  </div>`;

  // JOB CARDS
  const gc=jobs.length===1?'one':jobs.length===3?'three':'';
  h+=`<div class="jobs-grid ${gc}">`;

  for (const job of jobs) {
    const status=jobStatus(job);
    const [bCls,bTxt]=BADGE[status]||BADGE['not-started'];
    const {client,run}=splitJobName(job.name);
    const tr=matchTracker(job.name,trackerJobs);
    const days=job.shipDate?daysBetween(t,job.shipDate):null;
    const sdCls=days===0?'today':(days!==null&&(days<0||days<=3)?'urgent':'');

    const contractor = tr?(tr['Contractor']||''):'';
    const installDate= tr?parseDate(tr['Install Date']):null;
    const shopStatus = tr?(tr['Status']||''):'';
    const notes      = tr?(tr['Notes']||''):'';

    h+=`<div class="job-card ${status}">
      <div class="job-header">
        <div>
          <div class="job-name">${esc(client)}</div>
          ${run?`<div class="job-run">${esc(run)}</div>`:''}
        </div>
        <div class="job-badge ${bCls}">${bTxt}</div>
      </div>
      <div class="progress-section">
        <div class="progress-track"><div class="progress-fill ${fillClass(status)}" style="width:${job.pct}%"></div></div>
        <div class="progress-labels">
          <div class="progress-nums">${job.built} <span>/ ${job.total} cabs</span></div>
          <div class="progress-pct">${job.pct}%</div>
        </div>
      </div>
      <div class="tracker-row">
        <div class="tr-item">
          <div class="tr-label">Contractor</div>
          <div class="tr-value ${contractor?'':'dim'}">${contractor||'Not in tracker'}</div>
        </div>
        ${installDate?`<div class="tr-item"><div class="tr-label">Install Date</div><div class="tr-value">${fmtDate(installDate)}</div></div>`:''}
        ${shopStatus?`<div class="tr-item"><div class="tr-label">Shop Status</div><div class="tr-value"><span class="shop-badge ${shopBadgeClass(shopStatus)}">${esc(shopStatus)}</span></div></div>`:''}
        ${notes?`<div class="tr-item" style="flex:1;min-width:120px"><div class="tr-label">Notes</div><div class="tr-value" style="font-weight:400;font-size:12px;color:var(--muted)">${esc(notes)}</div></div>`:''}
      </div>
      ${job.shipDate?`<div class="ship-row">
        <div class="ship-label">Ship Date</div>
        <div>
          <span class="ship-date ${sdCls}">${fmtDate(job.shipDate)}</span>
          <span class="ship-countdown">${days===0?'— Today!':days<0?`(${Math.abs(days)}d overdue)`:`(${days}d away)`}</span>
        </div>
      </div>`:''}
    </div>`;
  }

  h+='</div>';
  document.getElementById('main').innerHTML=h;
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const [jobs, trackerJobs] = await Promise.all([fetchAssembly(), fetchTracker()]);

    if (jobs.length===0) {
      document.getElementById('main').innerHTML=
        '<div class="error-msg">Sheet loaded but no jobs found.<br>' +
        '<small>Check that row 2 has headers: <code>Job</code>, <code>Total Cabs</code>, <code>Built</code>, <code>Remaining</code>, <code>% Complete</code>, <code>Ship Date</code></small></div>';
      return;
    }

    render(jobs, trackerJobs);
    document.getElementById('stamp').textContent='Updated '+new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('main').innerHTML=
      `<div class="error-msg">
        Could not load assembly data.<br>
        <small><code>${esc(e.message)}</code></small><br><br>
        Make sure the Google Sheet is still published to web:<br>
        <small>File → Share → Publish to web → Sheet: SUMMARY → Format: CSV → Publish</small>
      </div>`;
    document.getElementById('stamp').textContent='Failed · '+new Date().toLocaleTimeString();
  }
}

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
